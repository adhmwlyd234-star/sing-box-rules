[General]
# =================================================================
# 1. التعديلات المتقدمة للتحكم في النواة والـ DNS (دماغ النفق السحابي)
# =================================================================

# تجزئة الحزمة الأولى (TLS Client Hello) وتأخير إرسالها بالملي ثانية لتشتيت الفحص العميق (DPI)
fragment = 10-20,5-10

# تعيين خوادم DNS عالمية، مشفرة وسريعة
dns-server = 1.1.1.1, 8.8.8.8, 9.9.9.9

# اختطاف (DNS Hijacking) لأي محاولة اتصال ببورت 53 وتوجيهها غصباً عبر فلترك الخاص
hijack-dns = *:53

# إغلاق الـ IPv6 تماماً لإجبار كل الترافيك على الـ IPv4 ومنع تسريب البيانات عبر مسارات خلفية
ipv6 = false

# استثناء ترافيك نظام آبل الأساسي لضمان استقرار الجهاز والبطارية
bypass-system = true

# إجبار النواة على جلب الـ Real-IP ومنع الـ Fake-IP للنطاقات المستهدفة لمطابقتها بدقة مع قواعد الحظر
always-real-ip = *.com, *.net, *.kr, *.pubgmobile.com, *.tencent.com, *.crashsight.com

# إجبار النواة على تحليل ترافيك الـ HTTP حتى لو خرج من بورتات ألعاب عشوائية (غير 80 أو 443)
force-http-header-parse = true

# تسريع استجابة بروتوكول ICMP محلياً لتقليل الضغط على المعالج أثناء الفحص
icmp-auto-reply = true


[Rule]
# =================================================================
# قواعد حل مشكلة بداية اللعبة والاتصال باللوبي والتحديثات (أولوية أولى)
# =================================================================
DOMAIN-SUFFIX, levelinfinite.com, DIRECT
DOMAIN-SUFFIX, proximabeta.com, DIRECT
DOMAIN-SUFFIX, igamecj.com, DIRECT

# =================================================================
# 2. ترسانة شروط المطابقة الذكية والديناميكية (الفلترة الذكية)
# =================================================================

# المطابقة بالتعابير النمطية (URL-REGEX) لصيد أي رابط يحتوي على كلمات التقارير أينما كتبت
URL-REGEX, (?i)log.*(upload|telemetry|analytics|bugly|crash), REJECT-DROP

# المطابقة ببصمة التطبيق (USER-AGENT) لقطع الاتصال عن أي طلب يخرج من محرك اللعبة أو نظام الحماية
USER-AGENT, *PUBG*, REJECT-DROP
USER-AGENT, *Tencent*, REJECT-DROP
USER-AGENT, *CrashSight*, REJECT-DROP

# قواعد الحظر الصريح المباشر للدومينات واللاحقات الفرعية التابعة لها
DOMAIN-SUFFIX, tencent.com, REJECT-DROP
DOMAIN-SUFFIX, pubgmobile.com, REJECT-DROP
DOMAIN-SUFFIX, crashsight.com, REJECT-DROP
DOMAIN-KEYWORD, telemetry, REJECT-DROP
DOMAIN-KEYWORD, analytics, REJECT-DROP
DOMAIN-KEYWORD, log-upload, REJECT-DROP

# استهداف النطاقات الجغرافية لعناوين الآي بي (IP-CIDR) الخاصة بخوادم استقبال التقارير
IP-CIDR, 43.128.0.0/16, REJECT-DROP
IP-CIDR, 49.51.0.0/16, REJECT-DROP
IP-CIDR, 119.28.0.0/16, REJECT-DROP

# السماح لجميع ترافيك الإنترنت الآخر بالمرور بشكل طبيعي ومباشر دون تدخل
FINAL, DIRECT


https://ahrefs.com/writing-tools/paragraph-rewriter
# =================================================================
# 3. ميزة إعادة كتابة الروابط (تعديل المسار والتوجيه الخفي)
# =================================================================

# تحويل مسار روابط رفع التقارير في الهواء إلى سيرفر وهمي محلي فارغ (Loopback IP)
# اللعبة ستظن أن التقرير تم رفعه بنجاح 100% لكنه ذهب إلى الثقب الأسود الرقمي
^https?://.*\.tencent\.com/log/upload http://127.0.0.1/ 302
^https?://.*\.crashsight\.com/report http://127.0.0.1/ 302


[Script]
# =================================================================
# 4. حقن السكريبتات البرمجية (تعديل محتوى الباكيت الداخلي)
# =================================================================

# سكريبت برمي يعترض محتوى الـ JSON أو الحزم الصادرة لتزييف البيانات (يتطلب رفع ملف الـ js على جيت هاب)
# قم باستبدال الرابط أدناه برابط ملف الـ Javascript الخاص بك لاحقاً إذا أردت التعديل على محتوى الـ Packets
modify_packet = type=http-request, pattern=^https?://.*\.crashsight\.com/report, script-path=https://raw.githubusercontent.com/your_github_username/your_repo/main/modify.js, timeout=10


[MITM]
# =================================================================
# 5. هجوم رجل المنتصف المحلي (فك تشفير حزم الـ HTTPS العميقة)
# =================================================================

# تفعيل النظام البرمي لفك تشفير حزم الـ SSL/TLS للنطاقات المحددة لقراءة محتواها وتعديله
enable = true
hostname = *.crashsight.com, *.tencent.com, *.pubgmobile.com
